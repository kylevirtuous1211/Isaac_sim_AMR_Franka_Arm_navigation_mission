scene:
  usd_path: /Isaac/Environments/Hospital/hospital.usd
planner:
  type: rrt_star
  occupancy:
    cell_size: 0.25
    raycast_z: 5.0
    obstacle_threshold: 0.15
    bounds:
    - -15
    - 15
    - -15
    - 15
  rrt_star:
    max_iter: 3000
    step_size: 0.6
    goal_bias: 0.15
    rewire_radius: 1.5
    goal_tolerance: 0.1
    smooth: true
    seed: null
navigator:
  type: waypoint
  robot:
    usd_path: /Isaac/Robots/NVIDIA/NovaCarter/nova_carter.usd
    prim_path: /World/NovaCarter
    name: nova_carter
    start_position:
    - 0.0
    - 0.0
    - 0.0
    start_orientation:
    - 1.0
    - 0.0
    - 0.0
    - 0.0
    wheel_dof_names:
    - joint_wheel_left
    - joint_wheel_right
    wheel_radius: 0.04
    wheel_base: 0.413
  max_linear_speed: 0.3
  max_angular_speed: 0.6
  waypoint_reach_threshold: 0.25
  stuck_threshold_ticks: 240
  stuck_position_tolerance: 0.01
  max_replans: 3
manipulator:
  type: franka_rmpflow
  prim_path: /World/Franka
  name: franka
  mount_to: /World/NovaCarter/chassis_link
  mount_local_offset:
  - 0.0
  - 0.0
  - 0.35
  # mount_mode controls how the Franka rides on the AMR:
  #   pose_sync   — per-tick callback teleports Franka to chassis + offset.
  #                 Decoupled physics (Franka mass doesn't load wheels).
  #   fixed_joint — UsdPhysics.FixedJoint with excludeFromArticulation.
  #                 Real PhysX coupling: arm mass loads wheels, reaction
  #                 torques propagate. Authored by apps/bootstrap.py.
  mount_mode: fixed_joint
  mount_sync_name: franka_base_sync
  clearance_height: 0.15
  approach_tolerance: 0.07
  grasp_hold_ticks: 40
  release_hold_ticks: 30
  phase_timeout_ticks: 800
  pick_z_offset: -0.1
  place_z_offset: 0.1
  rmpflow_config: /workspace/configs/rmpflow/franka_rmpflow_common.yaml
  rmpflow: {}
  surface_gripper:
    max_grip_distance: 0.15
    coaxial_force_limit: 50.0
    shear_force_limit: 50.0
    retry_interval: 1.0
    grip_offset_z: 0.1
task:
  point_a:
  - 2.0
  - 1.0
  - 0.0
  point_b:
  - 4.0
  - 1.0
  - 0.0
  cube_size: 0.0515
  place_standoff: 0.4
  place_tolerance: 0.2
  in_gripper_tolerance: 0.06
randomization:
  enabled: false
  seed: null
  max_attempts: 100
  min_separation: 0.5
  cube_z: 0.025
  start_bounds:
  - -1.0
  - 1.0
  - -1.0
  - 1.0
  goal_bounds:
  - 3.0
  - 7.0
  - 1.0
  - 5.0
  cube_bounds:
  - 1.5
  - 3.0
  - 0.5
  - 2.0
  place_bounds:
  - 4.0
  - 6.0
  - 2.0
  - 4.0
simulation:
  max_ticks: 50000
  physics_dt: null
